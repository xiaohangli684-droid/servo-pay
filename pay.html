<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>模拟支付 - 舵机控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .payment-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 24px 20px 32px;
            text-align: center;
        }
        .merchant-icon {
            width: 60px;
            height: 60px;
            background: #07c160;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: white;
            font-size: 28px;
        }
        .shop-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .amount {
            font-size: 42px;
            font-weight: 700;
            color: #1f2d3d;
            margin: 20px 0;
        }
        .amount small {
            font-size: 18px;
        }
        .pay-btn {
            background-color: #07c160;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        .pay-btn:active {
            transform: scale(0.97);
            background-color: #06ad56;
        }
        .note {
            font-size: 12px;
            color: #b0b8c5;
        }
        .loading {
            display: none;
            margin-top: 20px;
            font-size: 14px;
            color: #07c160;
        }
        .toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 40px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            z-index: 1000;
        }
        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein {
            from { bottom: 0; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }
        @keyframes fadeout {
            from { bottom: 30px; opacity: 1; }
            to { bottom: 0; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="merchant-icon">⚡</div>
        <div class="shop-name">智能舵机演示</div>
        <div class="amount">
            <small>¥</small> 0.01
        </div>
        <button class="pay-btn" id="payBtn">确认支付</button>
        <div class="note">🔔 这是一个模拟支付，不产生真实扣费<br>支付成功后将远程启动舵机</div>
        <div class="loading" id="loading">正在处理支付...</div>
    </div>
    <div id="toast" class="toast">✅ 支付成功！舵机已启动</div>

    <script>
        // ========================
        // 请替换成你自己的阿里云IoT HTTP API 地址
        // 如果暂时没有，可以先用测试地址观察效果（不会真的触发舵机）
        // ========================
        const CONTROL_URL = "https://api.aliyun.com/.../pub?deviceName=xxx&payload=open";

        const payBtn = document.getElementById('payBtn');
        const loadingDiv = document.getElementById('loading');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg || "✅ 支付成功！舵机已启动";
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function simulatePayment() {
            // 禁用按钮，显示加载
            payBtn.disabled = true;
            loadingDiv.style.display = 'block';

            // 模拟网络延迟 (1秒)
            setTimeout(() => {
                // 真正调用后端API
                fetch(CONTROL_URL, { method: 'POST' })
                    .then(response => {
                        loadingDiv.style.display = 'none';
                        if (response.ok) {
                            showToast("✅ 支付成功！舵机已启动");
                        } else {
                            showToast("❌ 支付失败，请重试");
                            payBtn.disabled = false;
                        }
                    })
                    .catch(error => {
                        loadingDiv.style.display = 'none';
                        console.error('请求失败:', error);
                        showToast("❌ 网络错误，请检查网络或API地址");
                        payBtn.disabled = false;
                    });
            }, 800);
        }

        payBtn.addEventListener('click', simulatePayment);
    </script>
</body>
</html>
