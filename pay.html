<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>情绪回收站 - 模拟支付</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
            margin-bottom: 12px;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 6px;
        }
        /* 情绪选择区域 */
        .emotion-section {
            background: rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 24px;
        }
        .emotion-label {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            margin-bottom: 16px;
            text-align: center;
        }
        .emotion-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .emotion-card {
            flex: 1;
            min-width: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
        }
        .emotion-card.selected {
            background: rgba(255,255,255,0.2);
            border-color: #ffd93d;
            transform: scale(1.02);
        }
        .emotion-emoji {
            font-size: 36px;
            margin-bottom: 6px;
        }
        .emotion-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }
        .emotion-price {
            font-size: 12px;
            color: #ffd93d;
            margin-top: 4px;
        }
        /* 金额和支付按钮 */
        .amount-section {
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
        }
        .amount-text {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }
        .amount-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffd93d;
        }
        .amount-value small {
            font-size: 16px;
        }
        .pay-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd93d 0%, #ffb347 100%);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }
        .pay-btn:active {
            transform: scale(0.97);
        }
        .pay-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .note {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }
        /* 加载和提示 */
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
            color: #ffd93d;
            font-size: 14px;
        }
        .toast {
            visibility: hidden;
            min-width: 220px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #ffd93d;
            text-align: center;
            border-radius: 40px;
            padding: 12px 20px;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast.show {
            visibility: visible;
            animation: fadein 0.3s, fadeout 0.3s 2.5s;
        }
        @keyframes fadein {
            from { opacity: 0; bottom: 20px; }
            to { opacity: 1; bottom: 40px; }
        }
        @keyframes fadeout {
            from { opacity: 1; bottom: 40px; }
            to { opacity: 0; bottom: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon">♻️</div>
        <div class="title">情绪回收站</div>
        <div class="subtitle">投递情绪 · 回收快乐</div>
    </div>

    <div class="emotion-section">
        <div class="emotion-label">🌱 今天你的心情是？</div>
        <div class="emotion-grid" id="emotionGrid">
            <div class="emotion-card" data-emotion="anxiety" data-emotion-name="焦虑">
                <div class="emotion-emoji">😰</div>
                <div class="emotion-name">焦虑</div>
                <div class="emotion-price">¥0.01</div>
            </div>
            <div class="emotion-card" data-emotion="happy" data-emotion-name="开心">
                <div class="emotion-emoji">😊</div>
                <div class="emotion-name">开心</div>
                <div class="emotion-price">¥0.01</div>
            </div>
            <div class="emotion-card" data-emotion="bored" data-emotion-name="无聊">
                <div class="emotion-emoji">😑</div>
                <div class="emotion-name">无聊</div>
                <div class="emotion-price">¥0.01</div>
            </div>
        </div>
    </div>

    <div class="amount-section">
        <span class="amount-text">应付金额</span>
        <span class="amount-value" id="amountDisplay"><small>¥</small> 0.01</span>
    </div>

    <button class="pay-btn" id="payBtn">💚 投递情绪 · 模拟支付</button>
    <div class="note">⚡ 模拟支付演示，不产生真实扣费<br>支付成功后舵机将推动对应颜色小球</div>
    <div class="loading" id="loading">🔄 正在处理你的情绪投递...</div>
</div>
<div id="toast" class="toast">✨ 投递成功！舵机已启动</div>

<script>
    // ========================
    // 阿里云 IoT HTTP API 配置
    // ⚠️ 请替换成你自己的实际参数
    // ========================
    const ALIYUN_CONFIG = {
        productKey: "你的ProductKey",
        deviceName: "你的DeviceName",
        // ⚠️ 重要：这里需要的是完整的API地址，不同的平台调用方式不同
        // 如果你用阿里云IoT，需要配置签名算法，建议先用测试模式确认通信
        apiUrl: "https://iot.cn-shanghai.aliyuncs.com"  // 示例地址，实际需要替换
    };

    // 当前选中的情绪
    let selectedEmotion = "anxiety";
    let selectedEmotionName = "焦虑";

    // DOM 元素
    const emotionCards = document.querySelectorAll('.emotion-card');
    const amountDisplay = document.getElementById('amountDisplay');
    const payBtn = document.getElementById('payBtn');
    const loadingDiv = document.getElementById('loading');
    const toast = document.getElementById('toast');

    // 情绪选择交互
    emotionCards.forEach(card => {
        card.addEventListener('click', () => {
            emotionCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedEmotion = card.getAttribute('data-emotion');
            selectedEmotionName = card.getAttribute('data-emotion-name');
            // 金额固定0.01元，也可以根据情绪不同设置不同金额
            amountDisplay.innerHTML = `<small>¥</small> 0.01`;
        });
    });

    // 默认选中第一个（焦虑）
    if (emotionCards.length > 0) {
        emotionCards[0].classList.add('selected');
    }

    function showToastMessage(msg) {
        toast.textContent = msg || "✨ 投递成功！舵机已启动";
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // 向阿里云IoT发送指令
    async function sendCommandToAliyunIoT(emotion) {
        // ⚠️ 这里需要根据阿里云IoT API的实际要求构造请求
        // 阿里云IoT的HTTP API需要签名，推荐在ESP32上实现MQTT订阅，网页直接调用后端服务
        
        // 方案1：如果你有简单的后端服务（如云函数），可以转发请求
        // 方案2：直接使用阿里云IoT的HTTP API（需要实现签名，较复杂）
        // 方案3：推荐在ESP32上运行MQTT订阅，网页通过一个简单代理触发
        
        // 以下是示例代码结构，实际需要替换为有效的请求
        const payload = {
            emotion: emotion,
            timestamp: Date.now()
        };
        
        // 示例：调用你自己的后端API（推荐）
        // const response = await fetch('https://你的后端服务.com/trigger-servo', {
        //     method: 'POST',
        //     headers: { 'Content-Type': 'application/json' },
        //     body: JSON.stringify(payload)
        // });
        
        // 临时模拟请求（替换为真实调用）
        console.log(`发送指令: 情绪=${emotion}`);
        return new Promise((resolve) => {
            setTimeout(() => {
                resolve({ ok: true });
            }, 500);
        });
    }

    async function simulatePayment() {
        // 防止重复点击
        if (payBtn.disabled) return;
        
        payBtn.disabled = true;
        loadingDiv.style.display = 'block';
        
        // 模拟支付处理延迟
        await new Promise(resolve => setTimeout(resolve, 1200));
        
        try {
            // 调用阿里云IoT接口
            const result = await sendCommandToAliyunIoT(selectedEmotion);
            
            loadingDiv.style.display = 'none';
            if (result.ok) {
                showToastMessage(`✅ 投递成功！你的「${selectedEmotionName}」情绪已被回收，舵机即将推动小球`);
            } else {
                showToastMessage(`❌ 投递失败，请重试`);
                payBtn.disabled = false;
            }
        } catch (error) {
            loadingDiv.style.display = 'none';
            console.error('请求失败:', error);
            showToastMessage(`❌ 网络错误，请检查网络或API配置`);
            payBtn.disabled = false;
        }
        
        // 3秒后重新启用按钮
        setTimeout(() => {
            payBtn.disabled = false;
        }, 3000);
    }
    
    payBtn.addEventListener('click', simulatePayment);
</script>
</body>
</html>
